version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Write server-side env vars into .env.production.local so Next.js
        # can read them at Lambda runtime (Amplify WEB_COMPUTE doesn't inject
        # non-NEXT_PUBLIC_ vars into the Lambda environment automatically)
        - echo "LLM_BASE_URL=$LLM_BASE_URL" >> .env.production.local
        - echo "LLM_MODEL=$LLM_MODEL" >> .env.production.local
        - echo "LLM_API_KEY=$LLM_API_KEY" >> .env.production.local
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
