version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Generate a server config file compiled into the Lambda bundle.
        # This is the only reliable way to pass secrets to Next.js API routes
        # on Amplify Gen 1 WEB_COMPUTE — env vars from the console don't reach
        # the Lambda runtime automatically.
        - mkdir -p src/generated
        - |
          cat > src/generated/config.ts << CONFIGEOF
          // Auto-generated at build time by amplify.yml — DO NOT COMMIT
          export const LLM_BASE_URL      = '${LLM_BASE_URL}';
          export const LLM_MODEL         = '${LLM_MODEL}';
          export const LLM_API_KEY       = '${LLM_API_KEY}';
          export const DYNAMO_ACCESS_KEY = '${DYNAMO_ACCESS_KEY}';
          export const DYNAMO_SECRET_KEY = '${DYNAMO_SECRET_KEY}';
          export const DYNAMO_REGION     = '${DYNAMO_REGION}';
          CONFIGEOF
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
